name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Describe the bug"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: "What did you tell Claude? What files were involved?"
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code Version
      description: "Run `claude --version`"
      placeholder: "2.1.70"
